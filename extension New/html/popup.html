<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universal Dating Premium Unlocker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 320px;
      padding: 14px;
      margin: 0;
      background-color: #f9f9f9;
    }
    h1 {
      font-size: 18px;
      color: #333;
      text-align: center;
      margin: 0 0 10px;
      letter-spacing: 0.5px;
    }
    .status {
      margin: 10px 0;
      padding: 10px;
      background-color: #e7f3fe;
      border: 1px solid #b3d4fc;
      border-radius: 4px;
      font-size: 15px;
      transition: background 0.2s, color 0.2s;
    }
    .status.active {
      background-color: #d4edda;
      border-color: #c3e6cb;
      color: #155724;
    }
    .status.inactive {
      background-color: #f8d7da;
      border-color: #f5c6cb;
      color: #721c24;
    }
    button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 15px;
      transition: background 0.15s;
      outline: none;
    }
    button:hover, button:focus {
      background-color: #0056b3;
    }
    .disclaimer {
      font-size: 12px;
      color: #666;
      text-align: center;
      margin-top: 12px;
      padding: 0 2px;
    }
    #statusText {
      font-weight: bold;
    }
    .small {
      font-size: 11px;
      color: #aaa;
      margin-top: 2px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Dating Premium Unlocker</h1>
  <div id="status" class="status">Checking status...</div>
  <button id="toggleStealth">Toggle Stealth Mode</button>
  <button id="openOptions">Open Settings</button>
  <div class="disclaimer">
    For educational use only. May violate site ToS (e.g., Tinder, BeNaughty).
    <div class="small">v1.0.5 &bull; &copy; 2025</div>
  </div>
  <script src="../js/popup.js"></script>
</body>
</html>
